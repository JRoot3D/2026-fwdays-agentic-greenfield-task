name: chord_dice
description: "Chord Dice — a music practice tool that rolls a D12 note and D20 chord type."
publish_to: 'none'

version: 1.0.1+2

environment:
  sdk: '>=3.6.0 <4.0.0'
  flutter: '>=3.27.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.9
  flutter_riverpod: ^3.3.1
  flutter_animate: ^4.5.2
  flutter_midi_pro: ^3.1.6
  path_provider: ^2.1.5
  vector_math: ^2.2.0  # 3D math for Dice3D polyhedra (ships with Flutter, declared for lint)
  shared_preferences: ^2.5.5
  sensors_plus: ^7.0.0
  share_plus: ^13.0.0
  music_notes: ^0.24.0
  riverpod_annotation: ^4.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  fake_async: ^1.3.3
  riverpod_generator: ^4.0.3
  build_runner: ^2.13.1
  riverpod_lint: ^3.1.3
  shared_preferences_platform_interface: ^2.4.2

flutter:
  uses-material-design: true
  assets:
    - assets/audio/salamander_grand.sf2
